<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin · Edge-Fast-Image-Queue</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card admin-head">
        <div>
          <p class="eyebrow">Admin Control Plane</p>
          <h1>Edge-Fast-Image-Queue 后台</h1>
          <p class="lead">控制队列、模型、密钥、广告和任务。所有修改都应该进入审计日志。</p>
        </div>
        <div class="actions">
          <button id="pauseBtn" class="button danger">暂停队列</button>
          <button id="resumeBtn" class="button primary">恢复队列</button>
        </div>
      </section>

      <section class="grid">
        <section class="card">
          <h2>配置</h2>
          <div id="settingsTable" class="table-placeholder">加载中...</div>
        </section>
        <section class="card">
          <h2>最近任务</h2>
          <div id="jobsTable" class="table-placeholder">加载中...</div>
        </section>
      </section>
    </main>
    <script src="/assets/admin.js" type="module"></script>
  </body>
</html>
